server:
  port: 8200

spring:
  application:
    name: data-foundry-scheduler-service
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://101.132.178.81:3306/data_foundry_scheduler?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: data_foundry_scheduler
    password: data_foundry_scheduler
  flyway:
    # M5b: keep Flyway opt-in during refactor (avoid surprising schema changes on startup).
    enabled: false
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

mybatis:
  configuration:
    map-underscore-to-camel-case: true

data-foundry:
  agent:
    base-url: http://127.0.0.1:8100
  backend:
    base-url: http://127.0.0.1:8000
    # Optional hardening: if backend enables internal callback token check, set the same token here.
    callback-token: ""
