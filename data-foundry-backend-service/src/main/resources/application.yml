server:
  port: 8000

datafoundry:
  admin:
    enabled: false
  internal:
    callback:
      # Optional hardening: require `X-Internal-Token` for internal scheduler callback.
      require-token: false
      token: ""
  task:
    execution:
      # Default during refactor: keep frontend experience stable even without scheduler/agent running.
      # For integration (scheduler→agent→backend callback driven), disable via:
      # - profile: `SPRING_PROFILES_ACTIVE=integration`, or
      # - env: `DATAFOUNDRY_TASK_EXECUTION_PLACEHOLDER_COMPLETE=false`
      placeholder-complete: true

spring:
  application:
    name: data-foundry-backend-service
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/data_foundry_backend?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    # url: jdbc:mysql://101.132.178.81:3306/data_foundry_backend?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: data_foundry_backend
    password: data_foundry_backend
  flyway:
    # M5b: keep Flyway opt-in during refactor (avoid surprising schema changes on startup).
    enabled: false
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

mybatis:
  configuration:
    map-underscore-to-camel-case: true

data-foundry:
  scheduler:
    base-url: http://127.0.0.1:8200
