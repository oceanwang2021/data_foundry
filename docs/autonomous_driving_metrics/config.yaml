# 自动驾驶运营指标采集 - 更新配置
# 供 batch_api_examples/update_metrics.py 读取

# 长表输出列顺序（所有 report.md 统一使用此表头）
long_table_headers:
  - 业态类别
  - comcode
  - 公司名称
  - 指标名称
  - 指标值
  - 单位
  - 数据时间
  - 数据来源
  - 逻辑说明及补充
  - Min_Value
  - Max_Value
  - Source_URL
  - Source_Evidence

# base xlsx 列名 → 标准指标名映射
# 格式：xlsx列名: [标准指标名, 单位, 逻辑说明来源列(可选)]
xlsx_col_to_metric:
  "运营城市(国内)":                 ["运营城市(国内)",          "",           ""]
  "运营城市(海外)":                 ["运营城市(海外)",          "",           ""]
  "牌照数量(国内)":                 ["牌照数量(国内)",          "张",         ""]
  "牌照数量(海外)":                 ["牌照数量(海外)",          "张",         ""]
  "牌照数量(总计)":                 ["牌照数量(总计)",          "张",         ""]
  "无人牌照数量":                   ["无人牌照数量",            "辆",         ""]
  "车队数量（辆）":                 ["车队数量",                "辆",         ""]
  "累计运营里程（万公里）":         ["累计运营里程",            "万公里",     ""]
  "累计订单数量（万单）":           ["累计订单数量",            "万单",       ""]
  "平均订单单价（元）":             ["平均订单单价",            "元",         ""]
  "脱手率":                         ["脱手率",                  "%",          "脱手率逻辑说明"]
  "事故率":                         ["事故率",                  "次/万公里",  "事故率逻辑说明"]
  "累计测试里程（万公里）":         ["累计测试里程",            "万公里",     ""]
  "累计自动驾驶测试里程（万公里）": ["累计自动驾驶测试里程",    "万公里",     ""]
  "自动驾驶占比":                   ["自动驾驶占比",            "%",          ""]
  "收入":                           ["收入",                    "亿元",       ""]
  "同比":                           ["收入同比增速",            "%",          ""]
  "研发投入":                       ["研发投入",                "亿元",       ""]
  "单车成本":                       ["单车成本",                "万元",       ""]

# 累计类指标（新值必须 >= 旧值，否则拦截）
monotonic_metrics:
  - 无人牌照数量
  - 牌照数量(国内)
  - 牌照数量(海外)
  - 牌照数量(总计)
  - 车队数量
  - 累计运营里程
  - 累计订单数量
  - 累计测试里程
  - 累计自动驾驶测试里程

# 视为空值的字符串（不区分大小写）
empty_values:
  - "-"
  - ""
  - "0"
  - "0.0"
  - "数据未公开"
  - "无"
  - "none"
  - "null"
  - "n/a"
  - "nan"

# report.md 中带括号英文后缀的列名 → 标准短名映射
header_alias:
  "业态类别 (Business Type)": "业态类别"
  "公司名称 (Company Name)":  "公司名称"
  "指标名称 (Metric Name)":   "指标名称"
  "指标值 (Value)":           "指标值"
  "单位 (Unit)":              "单位"
  "数据时间 (Data Period)":   "数据时间"
  "数据来源 (Data Source)":   "数据来源"
  "逻辑说明及补充 (Notes)":   "逻辑说明及补充"
  # 指标名称别名（新采集结果中可能使用的旧名）
  "同比":                     "收入同比增速"

# LLM 配置（独立配置，不复用 .env 中的节点配置）
llm:
  base_url: "https://api.openai.com/v1"   # 替换为实际 base_url
  api_key: ""                              # 留空则自动读取 OPENAI_API_KEY 环境变量
  model: "gpt-4o"
  max_tokens: 4096
  temperature: 0.2
  stream: true
  request_timeout: 120
  context_window: 128000
  # 思考模式（豆包等模型支持，普通模型保持 false）
  thinking_enabled: false
  filter_thinking: true
  # 推理强度：low / medium / high，填 null 表示不传该参数（不支持此参数的模型必须设为 null）
  reasoning_effort: null

# xlsx 导出：待核查/跳过行的颜色（ARGB 格式）
xlsx_colors:
  header_bg:  "1F4E79"
  header_fg:  "FFFFFF"
  review_bg:  "FFC7CE"   # 红：待核查（diff > 50%）
  skip_bg:    "FFEB9C"   # 黄：跳过（累计指标回退）
  alt_bg:     "F2F2F2"   # 灰：交替行
